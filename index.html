<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact & Newsletter Forms</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        input[type=text],
        input[type=email],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 6px;
            margin-bottom: 16px;
            resize: vertical;
        }

        input[type=submit] {
            background-color: #04AA6D;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type=submit]:hover {
            background-color: #45a049;
        }

        .container {
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
            margin-bottom: 40px;
        }

        h3 {
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- ================= CONTACT FORM ================= -->
    <h3>Contact Form</h3>

    <div class="container">
        <form id="contactForm" method="POST">

            <label for="contact_firstname">First Name</label>
            <input type="text" id="contact_firstname" name="firstname" placeholder="Your name..">

            <label for="contact_lastname">Last Name</label>
            <input type="text" id="contact_lastname" name="lastname" placeholder="Your last name..">

            <label for="contact_email">Email</label>
            <input type="email" id="contact_email" name="email" placeholder="Your email.." required>

            <label for="country">Country</label>
            <select name="country">
                <option value="Australia">Australia</option>
                <option value="Canada">Canada</option>
                <option value="USA">USA</option>
            </select>

            <label for="message">Message</label>
            <textarea name="message" placeholder="Write something.." style="height:200px"></textarea>

            <input type="submit" value="Send Message">
        </form>
    </div>


    <!-- ================= NEWSLETTER FORM ================= -->
    <h3>Newsletter Subscription</h3>

    <div class="container">
        <form id="newsletterForm" method="POST">

            <label for="newsletter_email">Email</label>
            <input type="email" id="newsletter_email" name="email" placeholder="Enter your email.." required>

            <input type="hidden" name="subscription_type" value="Newsletter">

            <input type="submit" value="Subscribe">
        </form>
    </div>


    <!-- ================= FORM HANDLERS ================= -->
    <script>
        // Contact Form
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            e.preventDefault();
            alert("Contact form submitted successfully!");
        });

        // Newsletter Form
        document.getElementById("newsletterForm").addEventListener("submit", function (e) {
            e.preventDefault();
            alert("Newsletter subscribed successfully!");
        });
    </script>


    <!-- ================= HUBSPOT TRACKING ================= -->
    <!-- Start of HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/2480504.js"></script>
    <!-- End of HubSpot Embed Code -->

</body>

</html>
